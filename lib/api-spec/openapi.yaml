          oneOf:
            - type: "null"
            - $ref: "#/components/schemas/ScoreWeights"
      required: [horizon, rankIC, rankICRating, icTStat, totalObservations, categoryIC, optimalWeights]

    BacktestMultiResult:
      type: object
      properties:
        ticker:
          type: string
        horizons:
          type: array
          items:
            $ref: "#/components/schemas/BacktestMultiHorizon"
        optimalHorizon:
          type: ["integer", "null"]
      required: [ticker, horizons, optimalHorizon]

    CrossSectionalICPeriod:
      type: object
      properties:
        date:
