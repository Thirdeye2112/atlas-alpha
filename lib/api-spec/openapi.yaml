openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Atlas Alpha - Quant Trading Signal Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: stock
    description: Stock analysis and data
  - name: scanner
    description: Market scanner operations
  - name: watchlist
    description: Watchlist management
  - name: market
    description: Market overview
  - name: backtest
    description: Walk-forward backtest and calibration
  - name: alerts
    description: Price and signal alerts
  - name: research
    description: Research and quantitative analysis tools

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /stock/{ticker}/quote:
    get:
      operationId: getStockQuote
      tags: [stock]
      summary: Get real-time stock quote
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Stock quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockQuote"
        "404":
          description: Ticker not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /stock/{ticker}/analysis:
    get:
      operationId: getStockAnalysis
      tags: [stock]
      summary: Full Atlas Alpha analysis for a ticker
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Full stock analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockAnalysis"
        "404":
          description: Ticker not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /stock/{ticker}/ohlcv:
    get:
      operationId: getStockOhlcv
      tags: [stock]
      summary: Get historical OHLCV bars
      description: Accepts optional query params period (1d,5d,1mo,3mo,6mo,1y,2y,5y) and interval (1m,5m,15m,30m,1h,1d,1wk)
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OHLCV bars
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OHLCVBar"
        "404":
          description: Ticker not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /scanner/top-longs:
    get:
      operationId: getScannerTopLongs
      tags: [scanner]
      summary: Top bullish candidates (Bullish Prob > 75%, Confidence > 80%)
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 25
      responses:
        "200":
          description: Top long candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScannerResponse"

  /scanner/top-shorts:
    get:
      operationId: getScannerTopShorts
      tags: [scanner]
      summary: Top bearish candidates (Bearish Prob > 75%, Confidence > 80%)
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 25
      responses:
        "200":
          description: Top short candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScannerResponse"

  /scanner/breakouts:
    get:
      operationId: getScannerBreakouts
      tags: [scanner]
      summary: Breakout candidates
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 25
      responses:
        "200":
          description: Breakout candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScannerResponse"

  /scanner/breakdowns:
    get:
      operationId: getScannerBreakdowns
      tags: [scanner]
      summary: Breakdown candidates
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 25
      responses:
        "200":
          description: Breakdown candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScannerResponse"

  /scanner/gamma-squeeze:
    get:
      operationId: getScannerGammaSqueeze
      tags: [scanner]
      summary: Gamma squeeze candidates
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 25
      responses:
        "200":
          description: Gamma squeeze candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScannerResponse"

  /scanner/short-squeeze:
    get:
      operationId: getScannerShortSqueeze
      tags: [scanner]
      summary: Short squeeze candidates
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 25
      responses:
        "200":
          description: Short squeeze candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScannerResponse"

  /scanner/institutional-accumulation:
    get:
      operationId: getScannerInstitutionalAccumulation
      tags: [scanner]
      summary: Institutional accumulation candidates
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 25
      responses:
        "200":
          description: Institutional accumulation candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScannerResponse"

  /scanner/mean-reversion:
    get:
      operationId: getScannerMeanReversion
      tags: [scanner]
      summary: Mean reversion candidates
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 25
      responses:
        "200":
          description: Mean reversion candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScannerResponse"

  /scanner/gap-setup-long:
    get:
      operationId: getScannerGapSetupLong
      tags: [scanner]
      summary: Gap setup — long candidates (elevated ATR + wide BB + volume spike, not yet gapping)
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 25
      responses:
        "200":
          description: Gap-up setup candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScannerResponse"

  /scanner/gap-setup-short:
    get:
      operationId: getScannerGapSetupShort
      tags: [scanner]
      summary: Gap setup — short candidates (elevated ATR + wide BB + extended above SMA200)
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 25
      responses:
        "200":
          description: Gap-down setup candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScannerResponse"

  /scanner/key-levels:
    get:
      operationId: getScannerKeyLevels
      tags: [scanner]
      summary: Stocks at major support or resistance (SMA50, SMA200, BB bands, swing S/R — within 2%)
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 25
      responses:
        "200":
          description: Stocks near key support or resistance levels
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScannerResponse"

  /scanner/gap-up:
    get:
      operationId: getScannerGapUp
      tags: [scanner]
      summary: Gap-up candidates (open > prev close by ≥2%)
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 25
      responses:
        "200":
          description: Gap-up candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScannerResponse"

  /scanner/gap-down:
    get:
      operationId: getScannerGapDown
      tags: [scanner]
      summary: Gap-down candidates (open < prev close by ≥2%)
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 25
      responses:
        "200":
          description: Gap-down candidates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScannerResponse"

  /scanner/custom:
    post:
      operationId: runCustomScan
      tags: [scanner]
      summary: Run a custom scan with user-defined filter criteria against the live 590-ticker universe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomScanInput"
      responses:
        "200":
          description: Custom scan results matching all supplied criteria
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScannerResponse"
        "400":
          description: Invalid criteria
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /watchlist:
    get:
      operationId: getWatchlist
      tags: [watchlist]
      summary: Get user watchlist
      responses:
        "200":
          description: Watchlist with live quotes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WatchlistItem"
    post:
      operationId: addToWatchlist
      tags: [watchlist]
      summary: Add ticker to watchlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WatchlistInput"
      responses:
        "201":
          description: Added to watchlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchlistEntry"
        "409":
          description: Already in watchlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /watchlist/refresh-prices:
    post:
      operationId: refreshWatchlistPrices
      tags: [watchlist]
      summary: Refresh today G/L for all watchlist items using live quotes
      responses:
        "200":
          description: Number of items updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: integer
                required: [updated]

  /watchlist/{ticker}:
    patch:
      operationId: updateWatchlistPosition
      tags: [watchlist]
      summary: Upsert broker position data for a ticker (creates entry if not present)
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WatchlistPositionInput"
      responses:
        "200":
          description: Position data updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchlistEntry"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      operationId: removeFromWatchlist
      tags: [watchlist]
      summary: Remove ticker from watchlist
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Removed from watchlist
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /market/overview:
    get:
      operationId: getMarketOverview
      tags: [market]
      summary: Market overview - SPY, QQQ, IWM, VIX
      responses:
        "200":
          description: Market overview data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketOverview"

  /stock/{ticker}/narrative:
    get:
      operationId: getStockNarrative
      tags: [stock]
      summary: AI-generated signal narrative (requires ENABLE_AI_NARRATIVE=true)
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: AI narrative text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NarrativeResponse"
        "503":
          description: AI narrative unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /backtest/ic:
    get:
      operationId: getBacktestIc
      tags: [backtest]
      summary: Walk-forward IC backtest for a single ticker
      parameters:
        - name: ticker
          in: query
          required: true
          schema:
            type: string
        - name: horizon
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Backtest result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestOutput"
        "400":
          description: Insufficient data or bad ticker
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /backtest/multi:
    get:
      operationId: getBacktestMulti
      tags: [backtest]
      summary: Multi-horizon IC sweep (1D, 5D, 10D, 20D) for a single ticker
      parameters:
        - name: ticker
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Multi-horizon backtest result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestMultiResult"
        "400":
          description: Insufficient data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /backtest/cross-sectional:
    get:
      operationId: getBacktestCrossSectional
      tags: [backtest]
      summary: Universe-wide cross-sectional Rank IC from signal_log snapshots
      parameters:
        - name: horizon
          in: query
          required: false
          schema:
            type: integer
            default: 5
      responses:
        "200":
          description: Cross-sectional IC result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrossSectionalICResult"

  /alerts:
    get:
      operationId: getAlerts
      tags: [alerts]
      summary: List all alerts
      responses:
        "200":
          description: Alert list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"
    post:
      operationId: createAlert
      tags: [alerts]
      summary: Create an alert
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertInput"
      responses:
        "201":
          description: Created alert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /alerts/triggered:
    get:
      operationId: getTriggeredAlerts
      tags: [alerts]
      summary: List triggered-but-unacknowledged alerts
      responses:
        "200":
          description: Triggered alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"

  /alerts/{id}:
    delete:
      operationId: deleteAlert
      tags: [alerts]
      summary: Delete an alert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required: [ok]

  /alerts/{id}/acknowledge:
    post:
      operationId: acknowledgeAlert
      tags: [alerts]
      summary: Acknowledge a triggered alert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required: [ok]

  /research/gap-analysis:
    get:
      operationId: getGapAnalysis
      tags: [research]
      summary: Historical gap analysis — factor correlation study
      description: >
        Scans the full scanner universe (1-year daily OHLCV), detects all significant gap events
        above the threshold, extracts 14 technical features at T-1 (day before each gap), and
        computes effect sizes to rank which factors most strongly precede gap-ups vs gap-downs.
        Results are cached server-side for 6 hours.
      parameters:
        - name: threshold
          in: query
          required: false
          description: Minimum absolute gap % to classify as a gap event (1–20, default 5)
          schema:
            type: number
            default: 5
      responses:
        "200":
          description: Gap analysis result with factor rankings and recent events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GapAnalysisResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    StockQuote:
      type: object
      properties:
        ticker:
          type: string
        name:
          type: string
        price:
          type: number
        change:
          type: number
        changePercent:
          type: number
        open:
          type: number
        high:
          type: number
        low:
          type: number
        previousClose:
          type: number
        volume:
          type: integer
        avgVolume:
          type: integer
        marketCap:
          type: ["number", "null"]
        week52High:
          type: number
        week52Low:
          type: number
        beta:
          type: ["number", "null"]
        pe:
          type: ["number", "null"]
        eps:
          type: ["number", "null"]
        sector:
          type: ["string", "null"]
        industry:
          type: ["string", "null"]
        timestamp:
          type: string
        marketState:
          type: ["string", "null"]
          description: "REGULAR | PRE | POST | POSTPOST | PREPRE | CLOSED"
        preMarketPrice:
          type: ["number", "null"]
        preMarketChangePercent:
          type: ["number", "null"]
        postMarketPrice:
          type: ["number", "null"]
        postMarketChangePercent:
          type: ["number", "null"]
      required:
        - ticker
        - name
        - price
        - change
        - changePercent
        - open
        - high
        - low
        - previousClose
        - volume
        - avgVolume
        - marketCap
        - week52High
        - week52Low
        - beta
        - pe
        - eps
        - sector
        - industry
        - timestamp

    OHLCVBar:
      type: object
      properties:
        time:
          type: string
        open:
          type: number
        high:
          type: number
        low:
          type: number
        close:
          type: number
        volume:
          type: integer
      required:
        - time
        - open
        - high
        - low
        - close
        - volume

    TrendIndicators:
      type: object
      properties:
        sma20:
          type: number
        sma50:
          type: number
        sma100:
          type: number
        sma200:
          type: number
        ema8:
          type: number
        ema21:
          type: number
        ema34:
          type: number
        goldenCross:
          type: boolean
        deathCross:
          type: boolean
        priceVsSma20:
          type: number
        priceVsSma50:
          type: number
        priceVsSma200:
          type: number
        trendAlignmentScore:
          type: number
        trendDirection:
          type: string
          enum: [strong_up, up, neutral, down, strong_down]
      required:
        - sma20
        - sma50
        - sma100
        - sma200
        - ema8
        - ema21
        - ema34
        - goldenCross
        - deathCross
        - priceVsSma20
        - priceVsSma50
        - priceVsSma200
        - trendAlignmentScore
        - trendDirection

    MomentumIndicators:
      type: object
      properties:
        rsi:
          type: number
        rsiSignal:
          type: string
          enum: [overbought, neutral, oversold]
        rsiDivergence:
          type: ["string", "null"]
          enum: [bullish, bearish, "null"]
        rsiDivergenceStrength:
          type: ["string", "null"]
          enum: [strong, weak, "null"]
        macd:
          type: number
        macdSignal:
          type: number
        macdHistogram:
          type: number
        macdCrossover:
          type: ["string", "null"]
          enum: [bullish, bearish, "null"]
        stochK:
          type: number
        stochD:
          type: number
        cci:
          type: number
        roc:
          type: number
        momentumScore:
          type: number
      required:
        - rsi
        - rsiSignal
        - rsiDivergence
        - macd
        - macdSignal
        - macdHistogram
        - macdCrossover
        - stochK
        - stochD
        - cci
        - roc
        - momentumScore

    VolumeIndicators:
      type: object
      properties:
        obv:
          type: number
        obvTrend:
          type: string
          enum: [rising, falling, flat]
        accumulationDistribution:
          type: number
        chaikinMoneyFlow:
          type: number
        vwap:
          type: number
        relativeVolume:
          type: number
        volumeSpike:
          type: boolean
        volumeScore:
          type: number
      required:
        - obv
        - obvTrend
        - accumulationDistribution
        - chaikinMoneyFlow
        - vwap
        - relativeVolume
        - volumeSpike
        - volumeScore

    VolatilityIndicators:
      type: object
      properties:
        atr:
          type: number
        atrPercent:
          type: number
        atrExpansion:
          type: boolean
        bollingerUpper:
          type: number
        bollingerMiddle:
          type: number
        bollingerLower:
          type: number
        bollingerWidth:
          type: number
        keltnerUpper:
          type: number
        keltnerLower:
          type: number
        volatilitySqueeze:
          type: boolean
        ivRank:
          type: ["number", "null"]
        ivPercentile:
          type: ["number", "null"]
        expectedMove:
          type: number
        expectedMovePercent:
          type: number
      required:
        - atr
        - atrPercent
        - atrExpansion
        - bollingerUpper
        - bollingerMiddle
        - bollingerLower
        - bollingerWidth
        - keltnerUpper
        - keltnerLower
        - volatilitySqueeze
        - ivRank
        - ivPercentile
        - expectedMove
        - expectedMovePercent

    OptionsAnalysis:
      type: object
      properties:
        putCallRatio:
          type: ["number", "null"]
        maxPain:
          type: ["number", "null"]
        callWall:
          type: ["number", "null"]
        putWall:
          type: ["number", "null"]
        gammaFlipLevel:
          type: ["number", "null"]
        unusualActivity:
          type: boolean
        optionsScore:
          type: number
        ivRankProxy:
          type: number
          description: "0–100 realized-vol percentile rank (IV Rank proxy)"
        realizedSkew:
          type: number
          description: "-1 to +1 skew proxy: positive = more up-days (call demand), negative = more down-days (put demand)"
      required:
        - putCallRatio
        - maxPain
        - callWall
        - putWall
        - gammaFlipLevel
        - unusualActivity
        - optionsScore
        - ivRankProxy
        - realizedSkew

    PatternDetection:
      type: object
      properties:
        patterns:
          type: array
          items:
            type: string
        marketStructure:
          type: string
          enum: [uptrend, downtrend, ranging]
        supportLevel:
          type: ["number", "null"]
        resistanceLevel:
          type: ["number", "null"]
      required:
        - patterns
        - marketStructure
        - supportLevel
        - resistanceLevel

    RelativeStrength:
      type: object
      properties:
        vsSpy:
          type: number
        vsQqq:
          type: number
        vsIwm:
          type: number
        vsSector:
          type: number
        rsScore:
          type: number
        sectorName:
          type: ["string", "null"]
      required:
        - vsSpy
        - vsQqq
        - vsIwm
        - vsSector
        - rsScore
        - sectorName

    AtlasAlphaScore:
      type: object
      properties:
        overall:
          type: number
        label:
          type: string
