kind = "web"
previewPath = "/"
title = "Atlas Alpha"
version = "1.0.0"
id = "artifacts/atlas-alpha"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20959

[services.development]
run = "pnpm --filter @workspace/atlas-alpha run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/atlas-alpha", "run", "build" ]
publicDir = "artifacts/atlas-alpha/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20959"
BASE_PATH = "/"
